{% extends 'privado/base.html' %}
{% load widget_tweaks %}

{% block conteudo %}
<main class="main">

  <div>
    <h1 class="page-title">Dashboard</h1>
    <p class="page-subtitle">Bem-vindo de volta, Bruno. Confira o resumo abaixo.</p>
  </div>

  <div class="section-card">
    <div class="section-card-header">
      <h2>Cadastrar / Editar Área</h2>
      <span style="font-size:.8rem;color:var(--text-muted)">* campos obrigatórios</span>
    </div>
    <div class="section-card-body">
      <form id="course-form" method="post">
        {% csrf_token %}
        <div class="form-section">

          <div class="form-group">
            <label>Nome <span class="required">*</span></label>
            <!--<input type="text" placeholder="Ex: Introdução à Programação com Python" required />-->
            {% render_field form.nome placeholder="Nome da Área" %}
          </div>

          <div class="form-group full">
            <div class="form-actions">
              <button type="submit" class="btn-form-primary">💾 Salvar Curso</button>
              <button type="reset" class="btn-form-secondary">Cancelar</button>
            </div>
          </div>

        </div>
      </form>
    </div>
  </div>

</main>
{% endblock %}
